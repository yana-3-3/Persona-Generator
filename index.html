<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --ink: #2a2a2a;
    --ink-soft: #5a5a5a;
    --ink-dim: #9a9a9a;
    --ink-faint: #c8c8c8;
    --line: #ececea;
    --line-soft: #f2f2f0;
    --hover: #f5f5f3;
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 400;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 64px 40px 80px;
  }
  @media (max-width: 640px) {
    .wrap { padding: 40px 20px 60px; }
  }

  header {
    margin-bottom: 56px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(38px, 5vw, 54px);
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--ink);
  }
  h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--ink-soft);
  }
  .lead {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--ink-soft);
    margin-top: 12px;
    max-width: 500px;
    font-weight: 300;
  }

  .grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 64px;
  }
  @media (max-width: 820px) {
    .grid { grid-template-columns: 1fr; gap: 48px; }
  }

  .controls-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .field label .en {
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    margin-left: 6px;
  }

  select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 10px 34px 10px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s ease;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4L5 7L8 4' stroke='%239a9a9a' fill='none' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    border-radius: 2px;
  }
  select:hover { border-color: var(--ink-dim); }
  select:focus { outline: none; border-color: var(--ink); }

  .summon-btn {
    width: 100%;
    margin-top: 20px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    border-radius: 2px;
  }
  .summon-btn:hover { background: #1a1a1a; }
  .summon-btn:active { transform: scale(0.99); }

  /* optional traits section */
  .optional-section {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
  }
  .optional-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .check-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  .check-row:hover { color: var(--ink); }
  .check-row input {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 1px solid var(--ink-faint);
    border-radius: 2px;
    margin-right: 10px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: all 0.15s;
    background: var(--surface);
  }
  .check-row input:hover { border-color: var(--ink-dim); }
  .check-row input:checked {
    background: var(--ink);
    border-color: var(--ink);
  }
  .check-row input:checked::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 5px;
    width: 4px;
    height: 8px;
    border: solid var(--bg);
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
  }
  .check-row-label {
    font-size: 13px;
    color: var(--ink-soft);
  }
  .check-row-en {
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    margin-left: 6px;
  }

  .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 12px;
    text-align: center;
  }
  .hint kbd {
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 1px 5px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 9px;
    color: var(--ink-soft);
  }

  .result-wrap { min-height: 500px; }

  .empty {
    height: 100%;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .empty-mark {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 88px;
    color: var(--ink-faint);
    line-height: 1;
    margin-bottom: 20px;
  }
  .empty p {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    color: var(--ink-dim);
    font-size: 17px;
    max-width: 260px;
    line-height: 1.5;
  }

  .persona {
    animation: fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .persona-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .persona-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }
  .persona-count {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    color: var(--ink-dim);
  }

  /* pagination */
  .pager {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .pager-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
    padding: 0;
  }
  .pager-btn:hover:not(:disabled) {
    border-color: var(--ink);
    color: var(--ink);
  }
  .pager-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .pager-btn svg {
    display: block;
  }
  .pager-position {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    padding: 0 10px;
    letter-spacing: 0.05em;
    min-width: 54px;
    text-align: center;
  }
  .pager-position .sep {
    color: var(--ink-faint);
    margin: 0 4px;
  }

  .traits {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 48px;
    margin-bottom: 40px;
  }
  @media (max-width: 520px) {
    .traits { grid-template-columns: 1fr; gap: 0; }
  }
  .trait {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line-soft);
    align-items: baseline;
  }
  .trait-label {
    font-size: 11px;
    color: var(--ink-dim);
  }
  .trait-value {
    font-size: 14px;
    color: var(--ink);
    word-break: keep-all;
    line-height: 1.4;
  }
  .trait-value .en {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 2px;
  }

  .tag-block {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 20px;
  }
  .tag-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line-soft);
  }
  .tag-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 5px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }
  .copy-btn:hover { border-color: var(--ink); color: var(--ink); }
  .copy-btn.copied { border-color: var(--ink); background: var(--ink); color: var(--bg); }

  .tag-output {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.9;
    color: var(--ink-soft);
    word-break: break-word;
  }
  .tag {
    display: inline-block;
    margin: 2px 1px;
    padding: 2px 8px;
    background: var(--hover);
    color: var(--ink);
    border-radius: 2px;
    transition: background 0.15s;
  }
  .tag:hover { background: #e8e8e6; }

  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }
  footer em {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Random Character Tool</div>
    <h1>Persona <em>Generator</em></h1>
  </header>

  <div class="grid">
    <aside>
      <div class="controls-label">Parameters</div>

      <div class="field">
        <label>성별<span class="en">gender</span></label>
        <select id="opt-gender">
          <option value="random">Random</option>
          <option value="female">여성</option>
          <option value="male">남성</option>
          <option value="androgynous">중성</option>
        </select>
      </div>

      <div class="field">
        <label>종족<span class="en">species</span></label>
        <select id="opt-species">
          <option value="random">Random</option>
          <option value="human">인간</option>
          <option value="elf">엘프</option>
          <option value="dark elf">다크 엘프</option>
          <option value="beastkin">수인</option>
          <option value="dragon">드래곤</option>
          <option value="demon">마족</option>
          <option value="angel">천사</option>
          <option value="vampire">뱀파이어</option>
          <option value="mermaid">인어</option>
          <option value="ghost">유령</option>
        </select>
      </div>

      <div class="field">
        <label>피부<span class="en">skin</span></label>
        <select id="opt-skin">
          <option value="random">Random</option>
          <option value="pale skin">창백함</option>
          <option value="fair skin">밝음</option>
          <option value="light brown skin">햇빛탄</option>
          <option value="dark skin">어두움</option>
          <option value="very dark skin">매우 어두움</option>
        </select>
      </div>

      <div class="field">
        <label>체형<span class="en">build</span></label>
        <select id="opt-build">
          <option value="random">Random</option>
          <option value="petite">작고 가냘픔</option>
          <option value="slim">슬림</option>
          <option value="average">평균</option>
          <option value="curvy">굴곡진 체형</option>
          <option value="athletic">운동선수형</option>
          <option value="tall">장신</option>
          <option value="chubby">통통함</option>
        </select>
      </div>

      <div class="field">
        <label>의상<span class="en">outfit category</span></label>
        <select id="opt-outfit">
          <option value="random">Random</option>
          <option value="daily">일상 / 캐주얼</option>
          <option value="formal">포멀 / 정장</option>
          <option value="school">교복</option>
          <option value="sport">스포츠</option>
          <option value="fantasy">판타지</option>
          <option value="traditional">전통</option>
          <option value="swimwear">수영복</option>
          <option value="winter">겨울</option>
          <option value="elegant">엘레강트 / 드레스</option>
          <option value="dark">다크 / 스트리트</option>
          <option value="gothic">고딕</option>
          <option value="celestial">신성한</option>
          <option value="casual">편한 / 홈웨어</option>
        </select>
      </div>

      <div class="optional-section">
        <div class="optional-label">Include</div>
        <label class="check-row">
          <input type="checkbox" id="inc-age">
          <span class="check-row-label">나이<span class="check-row-en">age</span></span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="inc-personality" checked>
          <span class="check-row-label">성격<span class="check-row-en">personality</span></span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="inc-expression" checked>
          <span class="check-row-label">표정<span class="check-row-en">expression</span></span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="inc-pose" checked>
          <span class="check-row-label">포즈<span class="check-row-en">pose</span></span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="inc-accessory" checked>
          <span class="check-row-label">액세서리<span class="check-row-en">accessory</span></span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="inc-detail">
          <span class="check-row-label">특수 디테일<span class="check-row-en">detail</span></span>
        </label>
        <label class="check-row">
          <input type="checkbox" id="inc-composition" checked>
          <span class="check-row-label">구도<span class="check-row-en">composition</span></span>
        </label>
      </div>

      <button class="summon-btn" id="summon">Generate</button>
      <div class="hint">
        <kbd>Space</kbd> 생성 · <kbd>←</kbd> <kbd>→</kbd> 이동
      </div>
    </aside>

    <main class="result-wrap" id="result">
      <div class="empty">
        <div class="empty-mark">✳</div>
        <p>Generate 버튼을 눌러<br>페르소나를 만들어보세요.</p>
      </div>
    </main>
  </div>

  <footer>
    <div id="session">SID · —</div>
    <em>formatted for stable diffusion / nai</em>
  </footer>
</div>

<script>
const DATA = {
  gender: {
    female:       { ko: "여성",  tag: "1girl" },
    male:         { ko: "남성",  tag: "1boy" },
    androgynous:  { ko: "중성",  tag: "1other, androgynous" }
  },
  species: {
    // compat: 이 종족이 입을 수 있는 코디 카테고리
    human:      { ko: "인간",       tags: [],                                                  compat: ["daily", "formal", "school", "sport", "fantasy", "traditional", "swimwear", "winter"] },
    elf:        { ko: "엘프",       tags: ["elf", "pointy ears"],                              compat: ["daily", "formal", "fantasy", "traditional", "winter", "elegant"] },
    "dark elf": { ko: "다크 엘프",  tags: ["dark elf", "pointy ears"],                          compat: ["daily", "fantasy", "dark", "elegant", "winter"] },
    beastkin:   { ko: "수인",       tags: [],                                                  compat: ["daily", "school", "sport", "fantasy", "traditional", "swimwear", "winter", "casual"] },
    dragon:     { ko: "드래곤",     tags: ["dragon horns", "dragon tail", "scales", "slit pupils"], compat: ["fantasy", "dark", "elegant", "traditional"] },
    demon:      { ko: "마족",       tags: ["demon horns", "demon tail", "pointy ears"],         compat: ["daily", "formal", "fantasy", "dark", "elegant", "gothic"] },
    angel:      { ko: "천사",       tags: ["angel wings", "halo"],                             compat: ["daily", "formal", "fantasy", "elegant", "celestial", "traditional"] },
    vampire:    { ko: "뱀파이어",   tags: ["vampire", "fangs", "pale skin"],                    compat: ["daily", "formal", "dark", "gothic", "elegant", "winter"] },
    mermaid:    { ko: "인어",       tags: ["mermaid", "fish tail", "scales", "fins"],          compat: ["mermaid_only"] },
    ghost:      { ko: "유령",       tags: ["ghost", "transparent"],                            compat: ["daily", "formal", "school", "sport", "fantasy", "traditional", "swimwear", "winter", "casual", "elegant", "dark", "gothic", "ghost_safe"] }
  },

  // 수인 세부 동물 (species가 beastkin일 때만 사용)
  beastkinAnimal: {
    cat:       { ko: "고양이",   tags: ["animal ears", "cat ears", "cat tail", "animal ear fluff"] },
    fox:       { ko: "여우",     tags: ["animal ears", "fox ears", "fox tail", "animal ear fluff"] },
    wolf:      { ko: "늑대",     tags: ["animal ears", "wolf ears", "wolf tail"] },
    dog:       { ko: "개",       tags: ["animal ears", "dog ears", "dog tail"] },
    rabbit:    { ko: "토끼",     tags: ["animal ears", "rabbit ears", "rabbit tail"] },
    mouse:     { ko: "쥐",       tags: ["animal ears", "mouse ears", "mouse tail"] },
    tiger:     { ko: "호랑이",   tags: ["animal ears", "tiger ears", "tiger tail", "animal ear fluff"] },
    lion:      { ko: "사자",     tags: ["animal ears", "lion ears", "lion tail", "animal ear fluff"] },
    bear:      { ko: "곰",       tags: ["animal ears", "bear ears", "animal ear fluff"] },
    deer:      { ko: "사슴",     tags: ["animal ears", "deer ears", "antlers"] },
    sheep:     { ko: "양",       tags: ["animal ears", "sheep ears", "sheep horns"] },
    goat:      { ko: "염소",     tags: ["animal ears", "goat ears", "goat horns"] },
    horse:     { ko: "말",       tags: ["animal ears", "horse ears", "horse tail"] },
    cow:       { ko: "소",       tags: ["animal ears", "cow ears", "cow horns"] },
    raccoon:   { ko: "너구리",   tags: ["animal ears", "raccoon ears", "raccoon tail", "animal ear fluff"] },
    squirrel:  { ko: "다람쥐",   tags: ["animal ears", "squirrel ears", "squirrel tail", "animal ear fluff"] },
    panda:     { ko: "판다",     tags: ["animal ears", "panda ears", "animal ear fluff"] },
    bird:      { ko: "새",       tags: ["feathered wings", "bird tail"] },
    snake:     { ko: "뱀",       tags: ["snake tail", "slit pupils", "scales"] }
  },
  skin: {
    "pale skin":        "창백한 피부",
    "fair skin":        "밝은 피부",
    "light brown skin": "햇빛탄 피부",
    "dark skin":        "어두운 피부",
    "very dark skin":   "매우 어두운 피부"
  },
  hairColor: {
    "black hair":              "검은색",
    "dark brown hair":          "진갈색",
    "brown hair":               "갈색",
    "light brown hair":         "연갈색",
    "blonde hair":              "금발",
    "platinum blonde hair":     "플래티넘 블론드",
    "strawberry blonde hair":   "스트로베리 블론드",
    "white hair":               "흰색",
    "silver hair":              "은발",
    "grey hair":                "회색",
    "red hair":                 "빨간색",

const pick = (obj) => {
  const keys = Object.keys(obj);
  return keys[Math.floor(Math.random() * keys.length)];
};
// 현재 머리 길이 level보다 작거나 같은 minLevel을 가진 항목만 필터링해서 뽑기
const pickByMinLevel = (obj, currentLevel) => {
  const validKeys = Object.keys(obj).filter(k => obj[k].minLevel <= currentLevel);
  return validKeys[Math.floor(Math.random() * validKeys.length)];
};
const getVal = (id) => document.getElementById(id).value;
const resolve = (selected, dataObj) => selected === "random" ? pick(dataObj) : selected;

function makeSid() {
  const chars = "0123456789ABCDEF";
  let id = "";
  for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * 16)];
  return id;
}
document.getElementById("session").textContent = "SID · " + makeSid();

// ============================================
// HISTORY SYSTEM
// ============================================
const history = [];      // 생성된 페르소나 배열
let currentIdx = -1;     // 현재 보고 있는 인덱스

function generate() {
  const genderKey  = resolve(getVal("opt-gender"), DATA.gender);
  const speciesKey = resolve(getVal("opt-species"), DATA.species);
  const skinKey    = resolve(getVal("opt-skin"), DATA.skin);
  const buildKey   = resolve(getVal("opt-build"), DATA.build);

  // 의상: 종족 호환성 + 사용자 선택 카테고리 기반 필터링
  const speciesCompat = DATA.species[speciesKey].compat;
  const outfitCategory = getVal("opt-outfit"); // "random" or a category
  const allOutfits = Object.keys(DATA.outfit);

  const filteredOutfits = allOutfits.filter(name => {
    const outfitCompat = DATA.outfit[name].compat;
    // 이 의상이 현재 종족에게 허용되는지 — 겹치는 카테고리가 하나라도 있어야 함
    const speciesOk = outfitCompat.some(c => speciesCompat.includes(c));
    if (!speciesOk) return false;
    // 사용자가 카테고리를 지정했으면 그 카테고리도 포함되어야 함
    if (outfitCategory !== "random") {
      return outfitCompat.includes(outfitCategory);
    }
    return true;
  });

  // 해당 종족에 맞는 코디가 하나도 없다면 fallback — 종족 기본 호환을 전부 사용
  let outfitKey;
  if (filteredOutfits.length > 0) {
    outfitKey = filteredOutfits[Math.floor(Math.random() * filteredOutfits.length)];
  } else {
    // 사용자가 선택한 카테고리가 현재 종족과 안 맞는 경우 → 종족 기준으로만 다시 필터
    const speciesOnly = allOutfits.filter(name => {
      return DATA.outfit[name].compat.some(c => speciesCompat.includes(c));
    });
    outfitKey = speciesOnly[Math.floor(Math.random() * speciesOnly.length)];
  }

  // 수인이면 세부 동물 추가 추출
  let beastkinAnimalKey = null;
  if (speciesKey === "beastkin") {
    beastkinAnimalKey = pick(DATA.beastkinAnimal);
  }

  const hairColorKey  = pick(DATA.hairColor);
  const hairLengthKey = pick(DATA.hairLength);
  const currentLevel  = DATA.hairLength[hairLengthKey].level;
  const hairStyleKey  = pickByMinLevel(DATA.hairStyle, currentLevel);
  const bangsKey      = pickByMinLevel(DATA.bangs, currentLevel);
  const eyeShapeKey   = pick(DATA.eyeShape);
  const eyeColorKey   = pick(DATA.eyeColor);
  const incAge = document.getElementById("inc-age").checked;
  const ageKey = incAge ? pick(DATA.ageTag) : "adult";

  // 부분염색 (15% 확률): 메인 머리색 + 다른 색 포인트
  // "{color1}, {color2} hair, streaked hair" 형태의 조합
  let streakedHair = null;
  if (Math.random() < 0.15) {
    // 메인 색과 다른 색 하나 더 고르기
    const allColors = Object.keys(DATA.hairColor).filter(c => c !== "gradient hair");
    const shuffled = [...allColors].sort(() => Math.random() - 0.5);
    const main = shuffled[0];
    const accent = shuffled.find(c => c !== main);
    streakedHair = {
      main,
      accent,
      mainKo: DATA.hairColor[main],
      accentKo: DATA.hairColor[accent]
    };
  }

  // 오드아이 (10% 확률): 좌우 다른 색
  let heterochromia = null;
  if (Math.random() < 0.10) {
    const allEyes = Object.keys(DATA.eyeColor);
    const shuffled = [...allEyes].sort(() => Math.random() - 0.5);
    const left = shuffled[0].replace(" eyes", "");
    const right = shuffled.find(c => c !== shuffled[0]).replace(" eyes", "");
    heterochromia = {
      left, right,
      leftKo: DATA.eyeColor[left + " eyes"],
      rightKo: DATA.eyeColor[right + " eyes"]
    };
  }

  const includeBreast = genderKey === "female" || genderKey === "androgynous";
  const breastKey = includeBreast ? pick(DATA.breast) : null;

  // 체크박스 상태 확인
  const incPers = document.getElementById("inc-personality").checked;
  const incExpr = document.getElementById("inc-expression").checked;
  const incPose = document.getElementById("inc-pose").checked;
  const incAcc  = document.getElementById("inc-accessory").checked;
  const incDet  = document.getElementById("inc-detail").checked;
  const incComp = document.getElementById("inc-composition").checked;

  // 액세서리 (50% 확률로 나옴, 켜져있을 때만)
  let accessory = null;
  if (incAcc && Math.random() < 0.7) {
    const accKey = pick(DATA.accessory);
    accessory = { key: accKey, ko: DATA.accessory[accKey] };
  }

  // 특수 디테일 (켜져있으면 항상 하나 나옴)
  let detail = null;
  if (incDet) {
    const detKey = pick(DATA.detail);
    detail = { key: detKey, ko: DATA.detail[detKey] };
  }

  // 구도
  let composition = null;
  if (incComp) {
    const compKey = pick(DATA.composition);
    composition = { key: compKey, ko: DATA.composition[compKey] };
  }

  // 하나라도 체크되어 있으면 아키타입을 하나 뽑음
  let archetypeKey = null;
  let personality = null;   // { koList: [...], tagList: [...] }
  let expression  = null;   // { ko, key }
  let pose        = null;   // { ko, key }

  if (incPers || incExpr || incPose) {
    archetypeKey = pick(DATA.archetype);
    const arch = DATA.archetype[archetypeKey];

    if (incPers) {
      // 성격 키워드 2~3개 랜덤 추출 (중복 없이)
      const traitKeys = Object.keys(arch.traits);
      const n = 2 + Math.floor(Math.random() * 2); // 2 or 3
      const shuffled = [...traitKeys].sort(() => Math.random() - 0.5);
      const picked = shuffled.slice(0, Math.min(n, traitKeys.length));
      personality = {
        keys: picked,
        koList: picked.map(k => arch.traits[k])
      };
    }

    if (incExpr) {
      const exprKey = pick(arch.expressions);
      expression = { key: exprKey, ko: arch.expressions[exprKey] };
    }

    if (incPose) {
      const poseKey = pick(arch.poses);
      pose = { key: poseKey, ko: arch.poses[poseKey] };
    }
  }

  const tags = [];
  tags.push(DATA.gender[genderKey].tag);
  tags.push("solo");
  DATA.species[speciesKey].tags.forEach(t => tags.push(t));
  if (beastkinAnimalKey) {
    DATA.beastkinAnimal[beastkinAnimalKey].tags.forEach(t => { if (!tags.includes(t)) tags.push(t); });
  }

  // 인어 성별별 추가 태그 (AI가 꼬리를 제대로 그려주도록)
  if (speciesKey === "mermaid") {
    if (genderKey === "female") {
      tags.push("monster girl");
      tags.push("lower body fish");
    } else if (genderKey === "male") {
      tags.push("merman");
      tags.push("lower body fish");
    } else {
      tags.push("lower body fish");
    }
  }

  tags.push(ageKey);

  // 머리색: 부분염색이면 두 색 + streaked hair, 아니면 단일 색
  if (streakedHair) {
    tags.push(streakedHair.main);
    tags.push(streakedHair.accent);
    tags.push("streaked hair");
    tags.push("multicolored hair");
  } else {
    tags.push(hairColorKey);
  }
  tags.push(hairLengthKey);
  tags.push(hairStyleKey);
  tags.push(bangsKey);

  // 눈: 오드아이이면 좌우 다른 색 + heterochromia, 아니면 단일 색
  tags.push(eyeShapeKey);
  if (heterochromia) {
    tags.push("heterochromia");
    tags.push(heterochromia.left + " eyes");
    tags.push(heterochromia.right + " eyes");
  } else {
    tags.push(eyeColorKey);
  }
  if (skinKey && DATA.skin[skinKey] && !tags.includes(skinKey)) tags.push(skinKey);
  DATA.build[buildKey].tags.forEach(t => { if (!tags.includes(t)) tags.push(t); });
  if (breastKey) tags.push(breastKey);
  DATA.outfit[outfitKey].tags.forEach(t => { if (!tags.includes(t)) tags.push(t); });

  if (accessory) {
    if (!tags.includes(accessory.key)) tags.push(accessory.key);
  }
  if (detail) {
    if (!tags.includes(detail.key)) tags.push(detail.key);
  }
  if (composition) {
    if (!tags.includes(composition.key)) tags.push(composition.key);
  }

  // 성격은 danbooru 태그로 잘 안쓰이는 경우가 많아서 프롬프트에만 넣을지 제외
  // → 여기서는 성격 중 danbooru에 있는 것들만 안전하게 포함 (안전을 위해 제외)
  // 표정/포즈는 태그로 실제 쓰이니까 포함
  if (expression) {
    expression.key.split(", ").forEach(t => { if (!tags.includes(t)) tags.push(t); });
  }
  if (pose) {
    pose.key.split(", ").forEach(t => { if (!tags.includes(t)) tags.push(t); });
  }

  const uniqueTags = [...new Set(tags)];

  const persona = {
    gender:     { key: genderKey,  ko: DATA.gender[genderKey].ko, tag: DATA.gender[genderKey].tag },
    species: beastkinAnimalKey
      ? { key: `beastkin (${beastkinAnimalKey})`,
          ko: `수인 (${DATA.beastkinAnimal[beastkinAnimalKey].ko})` }
      : { key: speciesKey, ko: DATA.species[speciesKey].ko },
    skin:       { key: skinKey,    ko: DATA.skin[skinKey] },
    build:      { key: buildKey,   ko: DATA.build[buildKey].ko },
    outfit:     { key: outfitKey,  ko: outfitKey },
    hairColor:  streakedHair
      ? { key: `${streakedHair.main} + ${streakedHair.accent}, streaked`,
          ko: `${streakedHair.mainKo} + ${streakedHair.accentKo} (부분염색)` }
      : { key: hairColorKey, ko: DATA.hairColor[hairColorKey] },
    hairLength: { key: hairLengthKey, ko: DATA.hairLength[hairLengthKey].ko },
    hairStyle:  { key: hairStyleKey,  ko: DATA.hairStyle[hairStyleKey].ko },
    bangs:      { key: bangsKey,      ko: DATA.bangs[bangsKey].ko },
    eyeShape:   { key: eyeShapeKey,   ko: DATA.eyeShape[eyeShapeKey] },
    eyeColor:   heterochromia
      ? { key: `${heterochromia.left}/${heterochromia.right}, heterochromia`,
          ko: `왼쪽 ${heterochromia.leftKo} + 오른쪽 ${heterochromia.rightKo} (오드아이)` }
      : { key: eyeColorKey, ko: DATA.eyeColor[eyeColorKey] },
    age:        { key: ageKey, ko: DATA.ageTag[ageKey], included: incAge },
    breast: breastKey ? { key: breastKey, ko: DATA.breast[breastKey] } : null,
    archetype: archetypeKey ? { key: archetypeKey, ko: DATA.archetype[archetypeKey].ko } : null,
    personality,
    expression,
    pose,
    accessory,
    detail,
    composition,
    tags: uniqueTags
  };

  history.push(persona);
  currentIdx = history.length - 1;
  render();
}

function navigate(direction) {
  const newIdx = currentIdx + direction;
  if (newIdx < 0 || newIdx >= history.length) return;
  currentIdx = newIdx;
  render();
}

function render() {
  if (currentIdx < 0 || !history[currentIdx]) return;
  const p = history[currentIdx];

  const traits = [
    ["성별",    p.gender.ko,     p.gender.tag],
    ["종족",    p.species.ko,    p.species.key],
    ["피부",    p.skin.ko,       p.skin.key],
    ["체형",    p.build.ko,      p.build.key],
    ["머리색",  p.hairColor.ko,  p.hairColor.key],
    ["머리길이", p.hairLength.ko, p.hairLength.key],
    ["머리모양", p.hairStyle.ko,  p.hairStyle.key],
    ["앞머리",  p.bangs.ko,      p.bangs.key],
    ["눈모양",  p.eyeShape.ko,   p.eyeShape.key],
    ["눈동자",  p.eyeColor.ko,   p.eyeColor.key],
    ["의상",    p.outfit.ko,     p.outfit.key],
  ];
  if (p.breast) traits.push(["가슴", p.breast.ko, p.breast.key]);
  if (p.age.included) traits.push(["나이", p.age.ko, p.age.key]);
  if (p.accessory)   traits.push(["액세서리", p.accessory.ko, p.accessory.key]);
  if (p.detail)      traits.push(["디테일", p.detail.ko, p.detail.key]);
  if (p.composition) traits.push(["구도", p.composition.ko, p.composition.key]);
  if (p.personality) traits.push(["성격", p.personality.koList.join(", "), p.personality.keys.join(", ")]);
  if (p.expression)  traits.push(["표정", p.expression.ko, p.expression.key]);
  if (p.pose)        traits.push(["포즈", p.pose.ko, p.pose.key]);

  const traitsHTML = traits.map(([label, ko, tag]) => `
    <div class="trait">
      <div class="trait-label">${label}</div>
      <div class="trait-value">
        ${ko}
        <span class="en">${tag}</span>
      </div>
    </div>
  `).join("");

  const tagString = p.tags.join(", ");
  const tagsHTML = p.tags.map(t => `<span class="tag">${t}</span>`).join(" ");

  const prevDisabled = currentIdx <= 0 ? "disabled" : "";
  const nextDisabled = currentIdx >= history.length - 1 ? "disabled" : "";
  const personaNum = String(currentIdx + 1).padStart(3, "0");

  // 삼각형 아이콘 (SVG)
  const triLeft  = `<svg width="8" height="10" viewBox="0 0 8 10" fill="currentColor"><path d="M7 0L0 5L7 10V0Z"/></svg>`;
  const triRight = `<svg width="8" height="10" viewBox="0 0 8 10" fill="currentColor"><path d="M1 0L8 5L1 10V0Z"/></svg>`;

  document.getElementById("result").innerHTML = `
    <div class="persona">
      <div class="persona-header">
        <div class="persona-id">PERSONA · ${personaNum}</div>
        <div class="pager">
          <button class="pager-btn" id="pager-prev" ${prevDisabled} aria-label="이전">${triLeft}</button>
          <div class="pager-position">
            ${currentIdx + 1}<span class="sep">/</span>${history.length}
          </div>
          <button class="pager-btn" id="pager-next" ${nextDisabled} aria-label="다음">${triRight}</button>
        </div>
      </div>
      <div class="traits">${traitsHTML}</div>
      <div class="tag-block">
        <div class="tag-head">
          <div class="tag-title">Danbooru Tags</div>
          <button class="copy-btn" id="copy-btn">Copy</button>
        </div>
        <div class="tag-output">${tagsHTML}</div>
      </div>
    </div>
  `;

  // 페이지네이션 이벤트
  const prevBtn = document.getElementById("pager-prev");
  const nextBtn = document.getElementById("pager-next");
  if (!prevBtn.disabled) prevBtn.addEventListener("click", () => navigate(-1));
  if (!nextBtn.disabled) nextBtn.addEventListener("click", () => navigate(1));

  // 복사 버튼
  document.getElementById("copy-btn").addEventListener("click", () => {
    navigator.clipboard.writeText(tagString).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "Copied";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = "Copy";
        btn.classList.remove("copied");
      }, 1400);
    });
  });
}

document.getElementById("summon").addEventListener("click", generate);
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
  if (e.code === "Space" && e.target.tagName !== "BUTTON") {
    e.preventDefault();
    generate();
  } else if (e.code === "ArrowLeft") {
    e.preventDefault();
    navigate(-1);
  } else if (e.code === "ArrowRight") {
    e.preventDefault();
    navigate(1);
  }
});
</script>
